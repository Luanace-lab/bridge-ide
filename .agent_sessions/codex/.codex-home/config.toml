model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = false
writable_roots = ["/home/user/bridge/BRIDGE"]

[projects."/home/user/bridge/BRIDGE/.agent_sessions/codex"]
trust_level = "trusted"

[mcp_servers.bridge]
command = "python3"
args = ["/home/user/bridge/BRIDGE/Backend/bridge_mcp.py"]
required = true

[mcp_servers.bridge.env]
BRIDGE_CLI_AGENT_ID = "codex"
BRIDGE_CLI_ENGINE = "codex"
BRIDGE_CLI_HOME_DIR = "/home/user/bridge/BRIDGE/.agent_sessions/codex"
BRIDGE_CLI_INCARNATION_ID = "codex:codex:1773601770422933221"
BRIDGE_CLI_INSTRUCTION_PATH = "/home/user/bridge/BRIDGE/.agent_sessions/codex/AGENTS.md"
BRIDGE_CLI_PROJECT_ROOT = "/home/user/bridge/BRIDGE"
BRIDGE_CLI_RESUME_SOURCE = "codex_sot"
BRIDGE_CLI_SESSION_NAME = "acw_codex"
BRIDGE_CLI_WORKSPACE = "/home/user/bridge/BRIDGE/.agent_sessions/codex"
BRIDGE_REGISTER_TOKEN = "be597e6e78af3ea44e63fd09bafd200d6924ef9786e1cef443d8c89a81274a91"
BRIDGE_RESUME_ID = "019cec28-d5ef-75d1-a601-f7e9f9275776"
BRIDGE_TOKEN_CONFIG_FILE = "/home/user/.config/bridge/tokens.json"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"
