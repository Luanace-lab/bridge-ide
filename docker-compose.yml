services:
  bridge-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bridge-ide
    ports:
      - "${BRIDGE_HTTP_PUBLISH_PORT:-9111}:9111"   # HTTP API + Frontend
      - "${BRIDGE_WS_PUBLISH_PORT:-9112}:9112"   # WebSocket
    volumes:
      # Persist ALL runtime data between restarts/rebuilds
      - ./Backend/messages:/app/Backend/messages
      - ./Backend/logs:/app/Backend/logs
      - ./Backend/uploads:/app/Backend/uploads
      - ./Backend/agent_state:/app/Backend/agent_state
      - ./Backend/team.json:/app/Backend/team.json
      - ./Backend/automations.json:/app/Backend/automations.json
      - ./Backend/workflow_registry.json:/app/Backend/workflow_registry.json
      - ./Backend/event_subscriptions.json:/app/Backend/event_subscriptions.json
      - bridge-tokens:/data
      - ${HOME}/.config/bridge/n8n.env:/root/.config/bridge/n8n.env:ro
    environment:
      - PORT=9111
      - WS_PORT=9112
      - BRIDGE_HTTP_HOST=0.0.0.0
      - BRIDGE_WS_HOST=0.0.0.0
      - N8N_BASE_URL=${N8N_BASE_URL:-http://host.docker.internal:5678}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:9111/status"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  bridge-tokens:
