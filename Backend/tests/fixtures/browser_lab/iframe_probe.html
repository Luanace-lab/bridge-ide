<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Browser Lab Iframe Probe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: monospace; margin: 16px; background: #fff; color: #111; }
    pre { white-space: pre-wrap; word-break: break-word; border: 1px solid #ccc; padding: 12px; }
    iframe { width: 100%; height: 280px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Iframe Probe</h1>
  <iframe id="probe-frame" src="./navigator_header_storage.html?child=iframe"></iframe>
  <pre id="result">loading...</pre>
  <script>
    (function () {
      var frame = document.getElementById("probe-frame");
      var output = {
        probe: "iframe",
        directAccess: null,
        messageAccess: null,
        errors: []
      };

      function render() {
        window.__browserLabResult = output;
        document.getElementById("result").textContent = JSON.stringify(output, null, 2);
        document.body.setAttribute("data-ready", output.messageAccess ? "1" : "0");
      }

      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "browser-lab-result") {
          output.messageAccess = event.data.result;
          render();
        }
      });

      frame.addEventListener("load", function () {
        try {
          output.directAccess = frame.contentWindow.__browserLabResult || null;
        } catch (err) {
          output.errors.push(String(err));
        }
        render();
      });

      render();
    }());
  </script>
</body>
</html>
